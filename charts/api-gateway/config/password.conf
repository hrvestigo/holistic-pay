{{- if and (not .Values.secret.existingSecret) (ne "NONE" .Values.secret.encryptionAlgorithm) }}

{{- $hasAes := false }}
{{- range $k, $v := .Values.secret }}
{{- if and $v (ne "decryptionKey" $k) (ne "encryptionAlgorithm" $k) (ne "existingSecret" $k) }}
{{- $hasAes = true }}
{{- end }}
{{- end }}

{{- if $hasAes }}
key.for.decryption={{ required "Please define a decryption key in secret.decryptionKey" .Values.secret.decryptionKey }}
{{- end }}

{{- if .Values.secret.keyStorePassword }}
aes.javax.net.ssl.keyStorePassword={{ .Values.secret.keyStorePassword }}
{{- end }}

{{- if .Values.secret.trustStorePassword }}
aes.javax.net.ssl.trustStorePassword={{ .Values.secret.trustStorePassword }}
{{- end }}

{{- if .Values.secret.fsecureBasicAuthPassword }}
aes.fsecure.basic.auth.password={{ .Values.secret.fsecureBasicAuthPassword }}
{{- end }}

{{- end }}
