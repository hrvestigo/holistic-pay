# Default values for api-gateway.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

nameOverride: ""

image:
  registry: docker.io
  pullPolicy: IfNotPresent
  app:
    registry: # defaults to image.registry
    imageLocation: # overrides registry and image name
    tag: "" # overrides the image tag whose default is the chart appVersion.
    pullPolicy: # defaults to image.pullPolicy

imagePullSecrets: []

timezone: ""

secret:
  decryptionKey: ""
  trustStorePassword: ""
  keyStorePassword: ""
  existingSecret: ""
  encryptionAlgorithm: "AES_CBC"

logger:
  globalLogLevel: DEBUG
  logToFile: false # boolean value, default is false
  logDir: "/var/log/app"
  format: "STRING" # defines log format for stdout logger. Valid values are ECS, LOGSTASH, GELF, GCP, STRING
  logDirMount:
    enabled: false # boolean value, default is false
    spec:
      # emptyDir: {}
      # flexVolume:
        # driver: ""
        # fsType: ""
        # options:
          # basepath: ""
          # basename: ""
proxy:
  host: ""
  port: 8080
  nonProxyHosts: ""

routes:
  allowSensitiveDataEndpoints: false
  addressParser:
    serviceName: ""
    servicePortNumber: "8443"
  alcCollect:
    serviceName: ""
    servicePortNumber: "8443"
  authLimitControl:
    serviceName: ""
    servicePortNumber: "8443"
  balanceCheck:
    serviceName: ""
    servicePortNumber: "8443"
  balanceLog:
    serviceName: ""
    servicePortNumber: "8443"
  balanceReconciliation:
    serviceName: ""
    servicePortNumber: "8443"
  ccmsApi:
    serviceName: ""
    servicePortNumber: "8443"
  consumerFinance:
    serviceName: ""
    servicePortNumber: "8443"
  coreGateway:
    serviceName: ""
    servicePortNumber: "443"
  crdPayInstIss:
    serviceName: ""
    servicePortNumber: "8443"
  extDisputeInterface:
    serviceName: ""
    servicePortNumber: "8443"
  fsecure:
    serviceName: ""
    servicePortNumber: "8443"
  gsfCore:
    serviceName: ""
    servicePortNumber: "8443"
  panManager:
    serviceName: ""
    servicePortNumber: "8443"
  paymentOrder:
    serviceName: ""
    servicePortNumber: "8443"
  personRegistry:
    serviceName: ""
    servicePortNumber: "8443"
  personStructure:
    serviceName: ""
    servicePortNumber: "8443"
  pricingEngine:
    serviceName: ""
    servicePortNumber: "8443"
  productEngine:
    serviceName: ""
    servicePortNumber: "8443"
  sepaInst:
    serviceName: ""
    servicePortNumber: "8443"
  siriusQuery:
    serviceName: ""
    servicePortNumber: "8443"
  vetoManager:
    serviceName: ""
    servicePortNumber: "8443"

oauth2:
  enabled: false
  resourceUri: ""

healthStatusDownReturnCode: "418"

javaOpts: "-Xms256M -Xmx256M"

podAnnotations: {}

deploymentAnnotations: {}

serviceAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000

securityContext: {}

service:
  enabled: true
  type: ClusterIP
  port: 8443
  nodePort: ""
  clusterIP: ""
  loadBalancerIP: ""
  loadBalancerSourceRanges: []
  annotations: {}
  labels: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

tracing:
  enabled: false
  endpoint: ""
  samplingProbability: 0.1

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 50m
    memory: 256Mi

initContainers: []

nodeSelector: {}

tolerations: []

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/arch
              operator: In
              values:
                - amd64
            - key: kubernetes.io/os
              operator: In
              values:
                - linux
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - api-gateway
          topologyKey: kubernetes.io/hostname

deployment:
  replicaCount: 1
  annotations: {}
  labels: {}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  minReadySeconds: 10
  terminationGracePeriodSeconds: 60
  restartPolicy: Always
  startupProbe:
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 1
    failureThreshold: 50
    httpGet:
      path: /health/liveness
      port: http
      scheme: HTTPS
  readinessProbe:
    periodSeconds: 60
    timeoutSeconds: 10
    successThreshold: 1
    failureThreshold: 2
    httpGet:
      path: /health/readiness
      port: http
      scheme: HTTPS
  livenessProbe:
    periodSeconds: 60
    timeoutSeconds: 10
    failureThreshold: 3
    httpGet:
      path: /health/liveness
      port: http
      scheme: HTTPS

prometheus:
  exposed: true

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

mountServerCertFromSecret:
  enabled: false
  secretName: ""
  certPath: ""
  keyPath: ""

mountKeyStoreFromSecret:
  enabled: false
  secretName: ""
  keyStoreName: ""
  keyStoreType: JKS

mountTrustStoreFromSecret:
  enabled: false
  secretName: ""
  trustStoreName: ""
  trustStoreType: JKS

mountCaFromSecret:
  enabled: false
  secretName: ""

customVolumes: []

customMounts: []

customEnv: []

dnsResolver:
  name: java # allowed values are [netty, java] -

dnsConfig:
  options:
    - name: ndots
      value: "1"
